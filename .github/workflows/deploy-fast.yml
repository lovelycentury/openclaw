name: Deploy (fast — reuse base image)

# Use this when TypeScript source hasn't changed and you just want to
# redeploy the gateway image (e.g. config, Dockerfile.gateway tweaks).
# Skips the full source rebuild and reuses the existing :base image.

on:
  workflow_dispatch:

jobs:
  deploy-fast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push gateway image (reuse existing base)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.gateway
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/openclaw:base
            OPENCLAW_INSTALL_BROWSER=1
            OPENCLAW_INSTALL_DOCKER_CLI=1
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/openclaw:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: OPENCLAW_GATEWAY_TOKEN,TELEGRAM_BOT_TOKEN,OPENAI_API_KEY,FIGMA_TOKEN,V0_TOKEN,GH_TOKEN_PRIVAT,GH_TOKEN_PUBLIC,PERPLEXITY_API_KEY
          script: |
            cd ~/services
            cat > .env.secrets << EOF
            OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
            TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
            OPENAI_API_KEY=${OPENAI_API_KEY}
            FIGMA_TOKEN=${FIGMA_TOKEN}
            V0_TOKEN=${V0_TOKEN}
            GH_TOKEN_PRIVAT=${GH_TOKEN_PRIVAT}
            GH_TOKEN_PUBLIC=${GH_TOKEN_PUBLIC}
            PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
            EOF
            grep -v -f <(cut -d= -f1 .env.secrets | sed 's/^/^/;s/$/=/') .env 2>/dev/null > .env.tmp || true
            cat .env.tmp .env.secrets > .env
            rm -f .env.tmp .env.secrets
            docker compose pull openclaw-gateway
            docker compose up -d openclaw-gateway
            docker image prune -f
