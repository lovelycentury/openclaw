name: Build and Deploy

on:
  push:
    branches: [okrysho/claw]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/openclaw:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: OPENCLAW_GATEWAY_TOKEN,TELEGRAM_BOT_TOKEN
          script: |
            cd ~/services
            cat > .env.secrets << EOF
            OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
            TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
            EOF
            grep -v -f <(cut -d= -f1 .env.secrets | sed 's/^/^/;s/$/=/') .env 2>/dev/null > .env.tmp || true
            cat .env.tmp .env.secrets > .env
            rm -f .env.tmp .env.secrets
            docker compose pull openclaw-gateway
            docker compose up -d openclaw-gateway
            docker image prune -f
